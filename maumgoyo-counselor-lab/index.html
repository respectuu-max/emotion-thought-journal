<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>마음고요 상담분석실</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">상담자용 CSV 분석 도구</p>
      <h1>마음고요 상담분석실</h1>
    </div>
    <div class="header-actions">
      <button id="loadSampleBtn" class="secondary" type="button" title="예시 데이터 불러오기">예시</button>
      <button id="resetBtn" class="secondary" type="button" title="불러온 자료와 상담 메모 제거">자료 제거</button>
      <button id="printBtn" class="secondary" type="button" title="현재 분석 화면 인쇄">인쇄</button>
      <button id="exportBtn" class="primary" type="button" title="상담 요약 파일 내보내기">요약 저장</button>
    </div>
  </header>

  <main class="app-shell">
    <aside class="sidebar">
      <section class="panel upload-panel">
        <label class="drop-zone" for="csvInput" id="dropZone">
          <span class="drop-title">CSV 파일 불러오기</span>
          <span class="drop-copy">내담자용 앱에서 내보낸 record_type 기반 CSV를 선택하거나 끌어놓으세요.</span>
          <input id="csvInput" type="file" accept=".csv,text/csv">
        </label>
        <div class="file-meta" id="fileMeta">아직 불러온 파일이 없습니다.</div>
        <div class="share-mode-card" id="shareModeInfo">
          <span>공유 모드</span>
          <strong>CSV를 불러오면 표시됩니다.</strong>
          <p>민감정보 제외 여부를 여기서 확인할 수 있습니다.</p>
        </div>
        <p class="privacy-note">새 CSV를 불러오면 이전 분석 자료와 상담 메모는 자동으로 지워집니다. 이 앱은 분석 내용을 누적 저장하지 않습니다.</p>
      </section>

      <section class="panel">
        <h2>필터</h2>
        <label>
          내담자
          <select id="clientFilter"></select>
        </label>
        <label>
          기간 시작
          <input id="fromDate" type="date">
        </label>
        <label>
          기간 종료
          <input id="toDate" type="date">
        </label>
        <label>
          기록 유형
          <select id="typeFilter"></select>
        </label>
        <label>
          위험 신호
          <select id="riskFilter">
            <option value="all">전체</option>
            <option value="high_urge">충동 높음</option>
            <option value="actionized">행동화 있음</option>
            <option value="missed_practice">실천 미수행</option>
          </select>
        </label>
        <label>
          검색어
          <input id="keywordFilter" type="search" placeholder="상황, 생각, 감정, 메모 검색">
        </label>
      </section>

      <section class="panel">
        <h2>위험 기준</h2>
        <label>
          충동 높음 기준
          <input id="urgeThreshold" type="number" min="0" max="10" step="1" value="8">
        </label>
        <label>
          행동화 기준
          <input id="actionThreshold" type="number" min="0" max="5" step="1" value="4">
        </label>
        <label>
          실천 미수행 기준
          <input id="practiceMissThreshold" type="number" min="0" max="10" step="1" value="0">
        </label>
        <p class="privacy-note">내담자용 CSV 기준값입니다. 일반 CSV는 0-100 강도 기준으로 환산해 적용합니다.</p>
      </section>

      <section class="panel">
        <h2>컬럼 인식</h2>
        <dl class="mapping-list" id="mappingList"></dl>
      </section>
    </aside>

    <section class="workspace">
      <section class="metric-grid" id="metrics"></section>

      <section class="analysis-grid">
        <div class="panel chart-panel">
          <div class="panel-heading">
            <h2>감정·충동 흐름</h2>
            <select id="chartMode">
              <option value="emotion">감정 강도</option>
              <option value="urge">충동 강도</option>
              <option value="practice">실천 수행도</option>
            </select>
          </div>
          <canvas id="trendChart" width="960" height="320" aria-label="기간별 흐름 차트"></canvas>
        </div>

        <div class="panel focus-panel">
          <div class="panel-heading">
            <h2>상담 초점</h2>
            <button id="copyFocusBtn" class="secondary small" type="button">복사</button>
          </div>
          <div id="focusList" class="focus-list"></div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <h2>상황-생각-감정-충동-행동화 연쇄</h2>
          <div class="segmented" role="tablist" aria-label="보기 방식">
            <button id="chainViewBtn" class="active" type="button">연쇄</button>
            <button id="tableViewBtn" type="button">기록표</button>
          </div>
        </div>
        <div id="chainView" class="chain-list"></div>
        <div id="tableView" class="table-wrap hidden"></div>
      </section>

      <section class="panel notes-panel">
        <h2>상담 메모</h2>
        <textarea id="counselorNotes" placeholder="상담 중 확인한 핵심 패턴, 다음 회기 과제, 보호요인 등을 기록하세요. 메모는 저장되지 않으며 새 CSV를 불러오거나 자료를 제거하면 함께 지워집니다."></textarea>
      </section>
    </section>
  </main>

  <template id="emptyStateTemplate">
    <div class="empty-state">
      <h2>CSV를 불러오면 분석이 시작됩니다.</h2>
      <p>record_type, 날짜, 내용, 강도, 수행 여부 컬럼을 자동으로 찾아 상담용 요약과 연쇄 고리를 구성합니다.</p>
    </div>
  </template>

  <script src="app.js"></script>
</body>
</html>
